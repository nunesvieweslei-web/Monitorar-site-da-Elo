# Coloque este arquivo em:  .github/workflows/monitorar-elo.yml
#
# Ele faz o robô rodar sozinho, de graça, na nuvem do GitHub.
# Por padrão roda 1x por dia às 12h (UTC ≈ 9h de Brasília). Ajuste o "cron" se quiser.

name: Monitorar site da Elo

on:
  schedule:
    - cron: "0 12 * * *"   # todo dia às 12:00 UTC
  workflow_dispatch:         # botão para rodar manualmente quando quiser

# Permite que o robô salve a nova "foto" do site de volta no repositório
permissions:
  contents: write

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Rodar o monitor
        env:
          # Configure estes valores em: Settings > Secrets and variables > Actions
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python3 monitor_elo.py

      - name: Salvar a nova foto do site (se mudou)
        run: |
          git config user.name "robo-monitor"
          git config user.email "robo@example.com"
          git add snapshot.json
          git diff --staged --quiet || git commit -m "Atualiza snapshot do site da Elo"
          git push
